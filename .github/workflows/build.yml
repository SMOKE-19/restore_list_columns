name: build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  cargo-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo check
        working-directory: rust_restore_list_columns
        run: cargo check

  build-linux:
    name: Build Linux wheel for Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: cargo-check
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheel
        run: |
          docker run --rm \
            -v "$PWD/rust_restore_list_columns:/io" \
            ghcr.io/pyo3/maturin:latest \
            build --release --out dist --interpreter python${{ matrix.python-version }} --manylinux 2014

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-py${{ matrix.python-version }}
          path: rust_restore_list_columns/dist/*.whl
          if-no-files-found: error

  build-windows:
    name: Build Windows wheel for Python ${{ matrix.python-version }}
    runs-on: windows-latest
    needs: cargo-check
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust_restore_list_columns
          command: build
          args: --release --out dist --interpreter python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-py${{ matrix.python-version }}
          path: rust_restore_list_columns/dist/*.whl
          if-no-files-found: error
